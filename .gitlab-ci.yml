upload_to_minio:
  stage: deploy
  dependencies:
    - exec_windows
    - exec_linux
    - exec_linuxarm
    - exec_android_pro3
    - exec_windows_pro3
    - exec_windows_pro2
    - exec_windows_mdpro2
    - exec_linux_pro3
    - exec_linuxarm_pro3
    - exec_debian
    - exec_debianarm
    - exec_macos
  tags: 
    - linux
  variables:
    MINIO_DIR: koishipro/server
  script:
    - aws s3 --endpoint=https://minio.mycard.moe:9000 sync --delete dist/ s3://mycard/$MINIO_DIR
  only:
    - server
    - tags

upload_to_minio_develop:
  extends: upload_to_minio
  variables:
    MINIO_DIR: koishipro/server-develop
  only:
    - server-develop
